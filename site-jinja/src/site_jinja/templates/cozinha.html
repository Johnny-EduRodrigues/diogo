{% extends "base.html" %}

{% block conteudo %}
<div class="container">
    <h1>🍽️ Lista de Pedidos</h1>
    {% if existe_pedidos %}
    <table>
        <tbody>
            {% for pedido in pedidos %}
                <tr>
                   <td>{{loop.index}}</td> 
                   <td>Mesa: {{pedido.mesa}}</td>
                   <td>Pedido: {{pedido.prato|title}}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}
    {{hoje|datetime_format("%B %Y")}}
    <br>
    <br>

    <div class="atulizar">    
      <a href="/atualizar_pedidos"><button type="button">Atualizar Pedido</button></a>
    </div>

<div class="terminar">
    <h1>Mandar pedido para o balcão!</h1>

    <form action="/balcao" method="post">

        <label>Mesa:</label>
        <input type="text" name="mesa">

        <button type="submit">Mandar pedido para o balcão</button>

    </form>
</div>

</div>

{% endblock %}
