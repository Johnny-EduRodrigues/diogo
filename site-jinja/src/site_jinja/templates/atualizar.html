{% extends "base.html" %}

{% block conteudo %}
<div class="container">
    {% if existe_pedidos %}
    <h1>🍽️ Pedidos</h1>
    <table>
        <tbody>
            {% for pedido in pedidos %}
                <tr>
                   <td>{{loop.index}}</td> 
                   <td>Mesa: {{pedido.mesa}}</td>
                   <td>Pedido: {{pedido.prato|title}}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}
    {{hoje|datetime_format("%B %Y")}}
    
</div>

<div class="atulizar">
    <h1>Atualize os Pedidos</h1>
    
    <form action="atualizar-pedido" method="POST">
        
        <label for="campo_prato">Nome do Prato:</label>
        <input type="text" id="campo_prato" name="atualizar_prato" placeholder="Ex: Hambúrguer" required>
        
        <br><br>

 

        <br><br>

        <button type="submit">Atualizar para a Cozinha 👨‍🍳</button>
    </form>
</div>



{% endblock %}
